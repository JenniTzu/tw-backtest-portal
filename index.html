  <div class=&quot;insight yellow&quot;>
    <strong>為什麼 CAGR 會輸 Buy&amp;Hold？這正常嗎？</strong><br>
    主動擇時策略大部分時間空倉等待信號，錯過了市場持續上漲的漲幅——這是必然代價。
    更有意義的比較指標是 <strong>卡馬比率（Calmar = CAGR ÷ 最大回撤絕對值）</strong>：
    衡量每承受 1% 的最大虧損，能換到幾%的年化報酬。Calmar 越高代表風險效率越好。<br><br>
    <strong>QQQ 回撤15% + 移動停損15%</strong> 的 Calmar = <strong>0.57</strong>，
    優於 QQQ Buy&amp;Hold 的 0.53——代表在風險調整後，這個策略比直接持有更有效率。

// ── 工具函式 ──
function fmt(v, suffix='%'){ return (v>=0?'+':'')+v.toFixed(1)+suffix; }
function cls(v){ return v>=0 ? 'pos' : 'neg'; }
function fmtMoney(v){ return '$'+Math.round(v).toLocaleString(); }

// ── 對比表 ──
function buildCompare(){
  const t = document.getElementById('compareTable');
  const hdrs = ['策略','進場信號','出場規則','資料期間','交易次數','勝率',
                '總報酬','年化(CAGR)','最大回撤','平均報酬/筆',
                'BH總報酬','BH年化','BH最大回撤','Calmar↑','BH Calmar'];
  t.innerHTML = '<thead><tr>' + hdrs.map(h=>`<th>${h}</th>`).join('') + '</tr></thead>';
  const rows = RESULTS.map((r,i) => {
    if(r.error) return `<tr><td class=&quot;scenario-name&quot;>${NAMES[i]}</td><td colspan=&quot;12&quot; style=&quot;color:#DC2626;text-align:left&quot;>${r.error}</td></tr>`;
    const beat = r.cagr >= r.bh_cagr;
    return `<tr>
      <td class=&quot;scenario-name&quot;>${NAMES[i]}</td>
      <td class=&quot;neutral&quot;>${r.entry_desc}</td>
      <td class=&quot;neutral&quot;>${r.exit_desc}</td>
      <td class=&quot;neutral&quot; style=&quot;font-size:.78rem&quot;>${r.period}</td>
      <td class=&quot;neutral&quot;>${r.trades}</td>
      <td class=&quot;${cls(r.win_rate-50)}&quot;>${r.win_rate}%</td>
      <td class=&quot;${cls(r.total_ret)}&quot; style=&quot;font-weight:600&quot;>${fmt(r.total_ret)}</td>
      <td class=&quot;${beat?'pos':'neg'}&quot; style=&quot;font-weight:600&quot;>${fmt(r.cagr)}</td>
      <td style=&quot;color:#DC2626&quot;>${r.max_dd}%</td>
      <td class=&quot;${cls(r.avg_ret)}&quot;>${fmt(r.avg_ret)}</td>
      <td class=&quot;neutral&quot;>${fmt(r.bh_ret)}</td>
      <td class=&quot;neutral&quot;>${fmt(r.bh_cagr)}</td>
      <td class=&quot;neutral&quot;>${r.bh_max_dd}%</td>
      <td class=&quot;${r.calmar>=r.bh_calmar?'pos':'neg'}&quot; style=&quot;font-weight:700&quot;>${r.calmar?.toFixed(2)??'—'}</td>
      <td class=&quot;neutral&quot;>${r.bh_calmar?.toFixed(2)??'—'}</td>
    </tr>`;
  }).join('');
  t.innerHTML += `<tbody>${rows}</tbody>`;
}

// ── Tab 面板 HTML ──
function buildPanelHTML(r, i){
  if(r.error) return `<div style=&quot;color:#DC2626;padding:20px&quot;>${r.error}</div>`;
  const beat = r.cagr >= r.bh_cagr;

        <div class=&quot;label&quot;>最大回撤</div>
        <div class=&quot;val&quot; style=&quot;color:#DC2626&quot;>${r.max_dd}%</div>
        <div class=&quot;bh&quot;>vs B&amp;H <span>${r.bh_max_dd}%</span></div>
      </div>
      <div class=&quot;card info&quot;>
        <div class=&quot;label&quot;>勝率</div>
        <div class=&quot;val&quot;>${r.win_rate}%</div>

        <div class=&quot;label&quot;>平均報酬/筆</div>

    <div class=&quot;insight&quot; style=&quot;margin-bottom:24px&quot;>

// ── 建立 Tabs ──
function buildTabs(){
  const btnWrap   = document.getElementById('tabBtns');
  const panelWrap = document.getElementById('tabPanels');
  RESULTS.forEach((r, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = NAMES[i];
    btn.onclick = () => switchTab(i, btn);
    btnWrap.appendChild(btn);

    const panel = document.createElement('div');
    panel.id = `panel${i}`;
    panel.className = 'tab-panel' + (i===0?' active':'');
    panel.innerHTML = buildPanelHTML(r, i);
    panelWrap.appendChild(panel);
  });
  if(RESULTS.length > 0 &amp;&amp; !RESULTS[0].error) initCharts(0);
}

function switchTab(i, btn){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel${i}`).classList.add('active');
  if(!tabInited[i] &amp;&amp; !RESULTS[i].error) initCharts(i);
}
